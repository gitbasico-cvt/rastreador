<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Come-Come do Forró - Aracaju 2026</title>
    <style>
        /* ==========================================================================
           ESTILOS DO JOGO (CSS)
           ========================================================================== */
        body {
            background-color: #2c1a04; /* Fundo escuro remetendo à noite de São João */
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            color: #ff9f43;
            text-shadow: 2px 2px #ee5253;
            margin: 5px 0;
            font-size: 1.8rem;
            text-align: center;
        }

        h2 {
            color: #feca57;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1rem;
            text-align: center;
        }

        #placar {
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #feca57;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 5px 20px;
            border-radius: 20px;
            border: 1px solid #ff9f43;
        }

        /* Container do Labirinto Responsivo */
        #tabuleiro {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(9, 1fr);
            gap: 2px;
            background-color: #1e1102;
            padding: 8px;
            border: 4px solid #ff9f43;
            border-radius: 10px;
            box-shadow: 0px 0px 25px rgba(255, 159, 67, 0.6);
            touch-action: none; /* Impede o scroll da tela do celular ao jogar */
            
            /* Ajuste de tamanho dinâmico para telas pequenas e grandes */
            width: 90vw;
            height: 90vw;
            max-width: 450px;
            max-height: 450px;
        }

        /* Estilo de cada quadrado/bloco do jogo */
        .celula {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5.5vw; /* Tamanho do emoji baseado na tela */
            background-color: #3d2306;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        /* Trava o tamanho máximo dos emojis em telas grandes */
        @media (min-width: 500px) {
            .celula {
                font-size: 24px;
            }
        }

        /* Paredes do labirinto */
        .parede {
            background-color: #d63031; 
            border: 1px solid #ff7675;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Cantos especiais (Pontos Turísticos activos) */
        .ponto-turistico {
            background-color: #22a6b3 !important;
            border: 2px solid #7ed6df;
            animation: pulsar 1.5s infinite alternate;
        }

        @keyframes pulsar {
            from { transform: scale(0.95); box-shadow: 0 0 5px #7ed6df; }
            to { transform: scale(1.05); box-shadow: 0 0 15px #22a6b3; }
        }

        .chao-limpo {
            background-color: #271603;
        }

        /* ==========================================================================
           ESTILO DO MODAL RESPONSIVO
           ========================================================================== */
        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-conteudo {
            background-color: #ffffff;
            color: #333333;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 6px solid #ff9f43;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .modal-conteudo h2 {
            color: #ee5253;
            margin-top: 0;
            font-size: 22px;
        }

        .modal-conteudo p {
            font-size: 15px;
            line-height: 1.5;
            color: #444;
        }

        .modal-conteudo button {
            background-color: #10ac84;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
        }

        .modal-conteudo button:hover {
            background-color: #0ed29d;
        }

        .btn-proxima-fase {
            background-color: #ff9f43 !important;
            color: #2c1a04 !important;
        }
    </style>
</head>
<body>

    <h1> Sergipano o País do Forró </h1>
    <h2> Come-Come do Forró </h2>
    <div id="placar">Pontos: <span id="pontos-valor">0</span></div>

    <!-- Grade do Labirinto -->
    <div id="tabuleiro"></div>

    <!-- Janela de Informações Culturais / Fim de Jogo -->
    <div id="modal-info" class="modal">
        <div class="modal-conteudo">
            <h2 id="modal-titulo">Atração Junina</h2>
            <p id="modal-texto">História...</p>
            <div id="modal-footer">
                <button id="modal-botao" onclick="fecharModal()">Continuar Dançando! </button>
            </div>
        </div>
    </div>

    <audio id="player-forro" loop></audio>

    <script>
        /* ==========================================================================
           LÓGICA DO JOGO (JAVASCRIPT)
           ========================================================================== */

        const mapa = [
            ['C1', 'M', 'M', '1', 'M', 'M', 'M', 'M', 'C2'],
            ['M',  '1', 'M', '1', 'M', '1', '1', 'M', 'M'],
            ['M',  '1', 'M', 'M', 'M', 'M', '1', 'M', '1'],
            ['M',  '1', '1', '1', '1', 'M', '1', 'M', '1'],
            ['M',  'M', 'M', 'M', 'M', 'M', 'M', 'M', 'M'],
            ['1',  '1', 'M', '1', '1', '1', '1', '1', 'M'],
            ['1',  'M', 'M', 'M', 'M', 'M', 'M', '1', 'M'],
            ['M',  'M', '1', '1', 'M', '1', 'M', 'M', 'M'],
            ['C3', 'M', 'M', 'M', 'M', '1', 'M', 'M', 'C4']
        ];

        const infoCantos = {
            'C1': {
                titulo: "Forró Caju",
                texto: "Bem-vindo ao Forró Caju! Tradicional festa na praça de eventos dos mercados centrais, que reúne milhares de pessoas e movimenta o turismo desde a década de 90.",
                som: "sons/zinho.mp3" 
            },
            'C2': {
                titulo: "Rua de São João",
                texto: "Você chegou à icônica Rua de São João! O berço dos festejos juninos comunitários de Aracaju, mantendo o autêntico forró e o concurso de quadrilhas desde 1910.",
                som: "sons/erivaldo.mp3"
            },
            'C3': {
                titulo: "Arraiá do Povo",
                texto: "Arraiá do Povo, na Orla da Atalaia! Onde o chão ferve com a poeira do autêntico forró pé-de-serra, culinária típica e a vila cenográfica sergipana.",
                som: "sons/clemilda.mp3"
            },
            'C4': {
                titulo: "Gonzagão",
                texto: "Complexo Cultural Gonzagão! O grande templo do forró na zona sul de Aracaju, palco histórico de sanfoneiros e grandes campeonatos de quadrilha junina.",
                som: "sons/sergival.mp3"
            }
        };

        const somVitoria = "sons/vitoria.mp3";

        let casal = { x: 4, y: 4 };    
        let inimigo = { x: 0, y: 3 };  
        let pontos = 0;
        let jogoPausado = false;
        let casaSendoVisitada = null;  

        // [CONTROLE DE MOVIMENTO] -> Altere VELOCIDADE_JOGO para acelerar/desacelerar o casal
        let direcaoAtual = null; 
        let loopMovimento = null;
        const VELOCIDADE_JOGO = 220; 

        const tabuleiroElemento = document.getElementById('tabuleiro');
        const playerAudio = document.getElementById('player-forro');
        let audioCtx = null;

        function tocarTomMovimento() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                let oscilador = audioCtx.createOscillator();
                let ganho = audioCtx.createGain();
                oscilador.connect(ganho);
                ganho.connect(audioCtx.destination);

                oscilador.type = 'square'; 
                oscilador.frequency.setValueAtTime(440, audioCtx.currentTime); 
                oscilador.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.12);
                ganho.gain.setValueAtTime(0.45, audioCtx.currentTime); 
                ganho.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

                oscilador.start();
                oscilador.stop(audioCtx.currentTime + 0.12);
            } catch (e) {}
        }

        function tocarSomColisao() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let oscilador = audioCtx.createOscillator();
                let ganho = audioCtx.createGain();
                oscilador.connect(ganho);
                ganho.connect(audioCtx.destination);

                oscilador.type = 'sawtooth'; 
                oscilador.frequency.setValueAtTime(180, audioCtx.currentTime);
                oscilador.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3);
                ganho.gain.setValueAtTime(0.5, audioCtx.currentTime);
                ganho.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

                oscilador.start();
                oscilador.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        function desenharTabuleiro() {
            tabuleiroElemento.innerHTML = ''; 
            for (let l = 0; l < 9; l++) {
                for (let c = 0; c < 9; c++) {
                    const celula = document.createElement('div');
                    celula.classList.add('celula');

                    if (casal.x === l && casal.y === c) {
                        celula.innerHTML = '👩‍❤️‍👨'; 
                    } 
                    else if (inimigo.x === l && inimigo.y === c) {
                        celula.innerHTML = '👻';
                    } 
                    else {
                        let tipo = mapa[l][c];
                        if (tipo === '1') celula.classList.add('parede');
                        else if (tipo === 'M') celula.innerHTML = '🌽';
                        else if (['C1', 'C2', 'C3', 'C4'].includes(tipo)) {
                            celula.classList.add('ponto-turistico');
                            celula.innerHTML = '🎪'; 
                        } else celula.classList.add('chao-limpo');
                    }
                    tabuleiroElemento.appendChild(celula);
                }
            }
        }

        function executarPasso(direcao) {
            if (jogoPausado) return false;

            let proxX = casal.x;
            let proxY = casal.y;

            if (direcao === 'ArrowUp')   proxX--;
            if (direcao === 'ArrowDown') proxX++;
            if (direcao === 'ArrowLeft') proxY--;
            if (direcao === 'ArrowRight')proxY++;

            if (proxX >= 0 && proxX < 9 && proxY >= 0 && proxY < 9 && mapa[proxX][proxY] !== '1') {
                casal.x = proxX;
                casal.y = proxY;
                tocarTomMovimento();
                
                if (checarColisaoInimigo()) {
                    desenharTabuleiro();
                    return false; 
                }
                checarEventosTabuleiro();
                
                if (!jogoPausado) {
                    moverInimigoAtivo();
                    checarColisaoInimigo();
                }
                desenharTabuleiro();
                return true; 
            }
            return false; 
        }

        function iniciarLoopMovimento() {
            if (loopMovimento) clearInterval(loopMovimento);
            loopMovimento = setInterval(() => {
                if (direcaoAtual && !jogoPausado) {
                    let moveu = executarPasso(direcaoAtual);
                    if (!moveu) direcaoAtual = null; // Para o movimento se bater no muro
                }
            }, VELOCIDADE_JOGO);
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault(); 
                direcaoAtual = e.key; 
                executarPasso(direcaoAtual);
            }
        });

        // [CONTROLE DE TOQUE CELULAR] -> Altere "sensibilidade" se preferir arrastar menos o dedo
        let toqueXInicial = 0;
        let toqueYInicial = 0;

        tabuleiroElemento.addEventListener('touchstart', (e) => {
            toqueXInicial = e.touches[0].clientX;
            toqueYInicial = e.touches[0].clientY;
        }, { passive: true });

        tabuleiroElemento.addEventListener('touchend', (e) => {
            if (jogoPausado) return;

            let toqueXFinal = e.changedTouches[0].clientX;
            let toqueYFinal = e.changedTouches[0].clientY;
            let diffX = toqueXFinal - toqueXInicial;
            let diffY = toqueYFinal - toqueYInicial;

            let sensibilidade = 25; 
            let teclaSimulada = "";

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > sensibilidade) {
                    teclaSimulada = diffX > 0 ? 'ArrowRight' : 'ArrowLeft';
                }
            } else {
                if (Math.abs(diffY) > sensibilidade) {
                    teclaSimulada = diffY > 0 ? 'ArrowDown' : 'ArrowUp';
                }
            }

            if (teclaSimulada) {
                direcaoAtual = teclaSimulada; 
                executarPasso(direcaoAtual);
            }
        }, { passive: true });

        function moverInimigoAtivo() {
            let melhorMovimento = { x: inimigo.x, y: inimigo.y };
            let menorDistancia = Infinity;
            const direcoes = [{x: -1, y: 0}, {x: 1, y: 0}, {x: 0, y: -1}, {x: 0, y: 1}];

            direcoes.forEach(dir => {
                let testeX = inimigo.x + dir.x;
                let testeY = inimigo.y + dir.y;

                if (testeX >= 0 && testeX < 9 && testeY >= 0 && testeY < 9) {
                    if (mapa[testeX][testeY] !== '1') {
                        let dx = testeX - casal.x;
                        let dy = testeY - casal.y;
                        let distancia = Math.sqrt(dx * dx + dy * dy);

                        if (distancia < menorDistancia) {
                            menorDistancia = distancia;
                            melhorMovimento = { x: testeX, y: testeY };
                        }
                    }
                }
            });
            inimigo.x = melhorMovimento.x;
            inimigo.y = melhorMovimento.y;
        }

        function checarEventosTabuleiro() {
            let localAtual = mapa[casal.x][casal.y];
            if (localAtual === 'M') {
                pontos += 10;
                atualizarPlacar();
                mapa[casal.x][casal.y] = '0'; 
            }
            if (['C1', 'C2', 'C3', 'C4'].includes(localAtual)) {
                jogoPausado = true;
                direcaoAtual = null; 
                casaSendoVisitada = { x: casal.x, y: casal.y, codigo: localAtual };
                pontos = pontos * 2;
                atualizarPlacar();
                abrirModalCultural(localAtual);
            }
        }

        function checarColisaoInimigo() {
            if (casal.x === inimigo.x && casal.y === inimigo.y) {
                tocarSomColisao();
                direcaoAtual = null; 
                
                let perda = Math.round(pontos * 0.3);
                pontos = pontos - perda;
                if (pontos < 0) pontos = 0;
                
                atualizarPlacar();
                alert(`Opa, esbarrou no obstáculo! O casal perdeu o ritmo. Pena de -30% dos pontos (-${perda} pts). Voltando para o início!`);
                
                casal = { x: 4, y: 4 };
                inimigo = { x: 0, y: 3 };
                return true;
            }
            return false;
        }

        function verificarFimDeJogo() {
            for (let l = 0; l < 9; l++) {
                for (let c = 0; c < 9; c++) {
                    if (['C1', 'C2', 'C3', 'C4'].includes(mapa[l][c])) return false; 
                }
            }
            return true; 
        }

        function atualizarPlacar() {
            document.getElementById('pontos-valor').innerText = pontos;
        }

        function abrirModalCultural(cantoCodigo) {
            let dados = infoCantos[cantoCodigo];
            document.getElementById('modal-titulo').innerText = dados.titulo;
            document.getElementById('modal-texto').innerText = dados.texto;
            
            const botao = document.getElementById('modal-botao');
            botao.innerText = "Continuar Dançando! 🪗";
            botao.className = "";
            botao.setAttribute("onclick", "fecharModal()");
            document.getElementById('modal-info').style.display = 'flex';

            playerAudio.src = dados.som;
            playerAudio.play().catch(erro => {});
        }

        function fecharModal() {
            document.getElementById('modal-info').style.display = 'none';
            playerAudio.pause();
            playerAudio.currentTime = 0; 

            if (casaSendoVisitada) {
                mapa[casaSendoVisitada.x][casaSendoVisitada.y] = '0';
                casaSendoVisitada = null;
            }

            if (verificarFimDeJogo()) exibirTelaVitoria();
            else {
                jogoPausado = false;
                desenharTabuleiro();
            }
        }

        function exibirTelaVitoria() {
            jogoPausado = true;
            direcaoAtual = null;
            document.getElementById('modal-titulo').innerText = "✨ ¡Viva! Você Zerou Aracaju! ✨";
            document.getElementById('modal-texto').innerHTML = `Muito obrigado por valorizar a nossa cultura junina!<br><br>Sua pontuação final foi de: <strong>${pontos} pontos</strong>.<br><br>Que tal expandir sua jornada pelo País do Forró? Prepare o tamanco, pois na próxima fase vamos conhecer os tradicionais festejos do interior do estado, começando pelo histórico <strong>Forró de Areia Branca</strong>!`;
            
            const botao = document.getElementById('modal-botao');
            botao.innerText = "Partir para Areia Branca! 🚌";
            botao.className = "btn-proxima-fase";
            botao.setAttribute("onclick", "proximaFase()");
            document.getElementById('modal-info').style.display = 'flex';

            playerAudio.src = somVitoria;
            playerAudio.play().catch(erro => {});
        }

        function proximaFase() {
            playerAudio.pause();
            playerAudio.currentTime = 0;
            alert("Carregando o circuito turístico de Areia Branca... Prepare-se para novos desafios e mais forró!");
            location.reload(); 
        }

        desenharTabuleiro();
        iniciarLoopMovimento();
    </script>
</body>
</html>
