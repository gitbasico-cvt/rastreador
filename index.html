<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Come-Come do Forró - Aracaju 2026</title>
    <style>
        /* ==========================================================================
           ESTILOS DO JOGO (CSS) - RESTAURADOS E RESPONSIVOS
           ========================================================================== */
        body {
            background-color: #2c1a04; /* Fundo escuro remetendo à noite de São João */
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        h1 {
            color: #ff9f43;
            text-shadow: 3px 3px #ee5253;
            margin-bottom: 5px;
            margin-top: 5px;
            font-size: 1.8rem;
            text-align: center;
        }

        h2 {
            color: #feca57;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-align: center;
        }

        #placar {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #feca57;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 5px 20px;
            border-radius: 20px;
            border: 1px solid #ff9f43;
        }

        /* Container do jogo usando Canvas para movimento suave pixel por pixel */
        #canvas-container {
            position: relative;
            width: 90vw;
            height: 90vw;
            max-width: 450px;
            max-height: 450px;
            border: 4px solid #ff9f43;
            border-radius: 10px;
            box-shadow: 0px 0px 25px rgba(255, 159, 67, 0.6);
            background-color: #1e1102;
            touch-action: none; /* Impede a tela do celular de rolar ao jogar */
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ==========================================================================
           ESTILO DO MODAL (JANELA POP-UP HISTÓRICA E VITÓRIA)
           ========================================================================== */
        .modal {
            display: none; /* Oculto por padrão */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-conteudo {
            background-color: #ffffff;
            color: #333333;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 6px solid #ff9f43;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .modal-conteudo h2 {
            color: #ee5253;
            margin-top: 0;
            font-size: 28px;
        }

        .modal-conteudo p {
            font-size: 16px;
            line-height: 1.6;
            color: #444;
        }

        .modal-conteudo button {
            background-color: #10ac84;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
            width: 100%;
        }

        .modal-conteudo button:hover {
            background-color: #0ed29d;
        }

        /* Estilo específico para o botão de próxima fase */
        .btn-proxima-fase {
            background-color: #ff9f43 !important;
            color: #2c1a04 !important;
            font-weight: bold;
        }
        .btn-proxima-fase:hover {
            background-color: #ffb167 !important;
        }
    </style>
</head>
<body>

    <h1>🌽 Sergipe o País do Forró 🌽</h1>
    <h2>🌽 Come-Come do Forró 🌽</h2>
    <div id="placar">Pontos: <span id="pontos-valor">0</span></div>

    <div id="canvas-container">
        <canvas id="jogoCanvas" width="450" height="450"></canvas>
    </div>

    <!-- Janela de Informações Culturais / Fim de Jogo (Modal Restaurado) -->
    <div id="modal-info" class="modal">
        <div class="modal-conteudo">
            <h2 id="modal-titulo">Atração Junina</h2>
            <p id="modal-texto">História...</p>
            <div id="modal-footer">
                <button id="modal-botao" onclick="fecharModal()">Continuar Dançando! 🪗</button>
            </div>
        </div>
    </div>

    <!-- Elemento de áudio HTML5 invisível -->
    <audio id="player-forro" loop></audio>

    <script>
        /* ==========================================================================
            LÓGICA DO JOGO (JAVASCRIPT)
           ========================================================================== */
        const canvas = document.getElementById('jogoCanvas');
        const ctx = canvas.getContext('2d');

        // Dimensões lógicas internas para manter a proporção matemática
        const TAM_LOGICO = 450;
        const QTD_CASAS = 9;
        const TAM_CASA = TAM_LOGICO / QTD_CASAS; // 50px por casa

        // Mapa original do Labirinto
        const mapa = [
            ['C1', 'M', 'M', '1', 'M', 'M', 'M', 'M', 'C2'],
            ['M',  '1', 'M', '1', 'M', '1', '1', 'M', 'M'],
            ['M',  '1', 'M', 'M', 'M', 'M', '1', 'M', '1'],
            ['M',  '1', '1', '1', '1', 'M', '1', 'M', 'M'],
            ['M',  'M', 'M', 'M', 'M', 'M', 'M', 'M', 'M'],
            ['1',  '1', 'M', 'M', '1', '1', '1', '1', 'M'],
            ['1',  'M', 'M', 'M', 'M', 'M', 'M', '1', 'M'],
            ['M',  'M', '1', '1', 'M', '1', 'M', 'M', 'M'],
            ['C3', 'M', 'M', 'M', 'M', '1', 'M', 'M', 'C4']
        ];

        const infoCantos = {
            'C1': {
                titulo: "Forró Caju",
                texto: "Bem-vindo ao Forró Caju! Tradicional festa na praça de eventos dos mercados centrais, que reúne milhares de pessoas e movimenta o turismo desde a década de 90.",
                som: "sons/zinho.mp3" 
            },
            'C2': {
                titulo: "Rua de São João",
                texto: "Você chegou à icônica Rua de São João! O berço dos festejos juninos comunitários de Aracaju, mantendo o autêntico forró e o concurso de quadrilhas desde 1910.",
                som: "sons/erivaldo.mp3"
            },
            'C3': {
                titulo: "Arraiá do Povo",
                texto: "Arraiá do Povo, na Orla da Atalaia! Onde o chão ferve com a poeira do autêntico forró pé-de-serra, culinária típica e a vila cenográfica sergipana.",
                som: "sons/clemilda.mp3"
            },
            'C4': {
                titulo: "Gonzagão",
                texto: "Complexo Cultural Gonzagão! O grande templo do forró na zona sul de Aracaju, palco histórico de sanfoneiros e grandes campeonatos de quadrilha junina.",
                som: "sons/sergival.mp3"
            }
        };

        const somVitoria = "sons/vitoria.mp3";

        // Configuração de posições reais baseadas em pixels para suavidade completa
        let casal = { x: 4 * TAM_CASA + 25, y: 4 * TAM_CASA + 25, raio: 18, velocidade: 3.2 };
        
        // Inimigo configurado com velocidade perfeitamente constante e direções de patrulha fixa
        let inimigo = { 
            x: 0 * TAM_CASA + 25, 
            y: 3 * TAM_CASA + 25, 
            raio: 16, 
            velocidade: 1.8, 
            dirX: 1, 
            dirY: 0,
            tempoUltimoTeletransporte: Date.now() 
        };

        let pontos = 0;
        let jogoPausado = false;
        let casaSendoVisitada = null;  
        let teclasPressionadas = {};
        let toqueDirecao = { x: 0, y: 0 }; 

        // Gerador de Som Retrô Sintetizado
        let audioCtx = null;
        function tocarTomMovimento() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                let oscilador = audioCtx.createOscillator(), ganho = audioCtx.createGain();
                oscilador.connect(ganho); ganho.connect(audioCtx.destination);
                oscilador.type = 'square'; oscilador.frequency.setValueAtTime(440, audioCtx.currentTime); 
                oscilador.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.12);
                ganho.gain.setValueAtTime(0.2, audioCtx.currentTime); ganho.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                oscilador.start(); oscilador.stop(audioCtx.currentTime + 0.12);
            } catch (e) {}
        }

        function tocarSomColisao() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let oscilador = audioCtx.createOscillator(), ganho = audioCtx.createGain();
                oscilador.connect(ganho); ganho.connect(audioCtx.destination);
                oscilador.type = 'sawtooth'; oscilador.frequency.setValueAtTime(180, audioCtx.currentTime);
                oscilador.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3);
                ganho.gain.setValueAtTime(0.4, audioCtx.currentTime); ganho.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscilador.start(); oscilador.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        // Função Matemática de Colisão: Círculo contra os Quadrados das paredes
        function colideComParede(X, Y, raio) {
            for (let l = 0; l < QTD_CASAS; l++) {
                for (let c = 0; c < QTD_CASAS; c++) {
                    if (mapa[l][c] === '1') {
                        let pX = c * TAM_CASA;
                        let pY = l * TAM_CASA;

                        let maisProximoX = Math.max(pX, Math.min(X, pX + TAM_CASA));
                        let maisProximoY = Math.max(pY, Math.min(Y, pY + TAM_CASA));

                        let distXx = X - maisProximoX;
                        let distYy = Y - maisProximoY;
                        let distancia = Math.sqrt((distXx * distXx) + (distYy * distYy));

                        if (distancia < raio) return true;
                    }
                }
            }
            return false;
        }

        // Sorteia uma nova posição válida (pista livre) para o teletransporte do fantasma
        function teletransportarInimigo() {
            let posicoesValidas = [];
            for (let l = 0; l < QTD_CASAS; l++) {
                for (let c = 0; c < QTD_CASAS; c++) {
                    if (mapa[l][c] !== '1') {
                        posicoesValidas.push({ l: l, c: c });
                    }
                }
            }
            if (posicoesValidas.length > 0) {
                let sorteio = posicoesValidas[Math.floor(Math.random() * posicoesValidas.length)];
                inimigo.x = sorteio.c * TAM_CASA + 25;
                inimigo.y = sorteio.l * TAM_CASA + 25;
                
                // Redireciona para um sentido aleatório em linha reta assim que surge
                let direcoes = [{x: 1, y: 0}, {x: -1, y: 0}, {x: 0, y: 1}, {x: 0, y: -1}];
                let dirSorteada = direcoes[Math.floor(Math.random() * direcoes.length)];
                inimigo.dirX = dirSorteada.x;
                inimigo.dirY = dirSorteada.y;
            }
        }

        // Eventos do Teclado (Ativa enquanto segura, zera quando solta)
        window.addEventListener('keydown', e => { teclasPressionadas[e.key] = true; });
        window.addEventListener('keyup', e => { teclasPressionadas[e.key] = false; });

        // Eventos de Deslize Dinâmico (Celular)
        let inicioToque = null;
        canvas.addEventListener('touchstart', e => {
            let rect = canvas.getBoundingClientRect();
            inicioToque = {
                x: e.touches[0].clientX - rect.left,
                y: e.touches[0].clientY - rect.top
            };
        }, { passive: true });

        canvas.addEventListener('touchmove', e => {
            if (!inicioToque || jogoPausado) return;
            let rect = canvas.getBoundingClientRect();
            let atualToque = {
                x: e.touches[0].clientX - rect.left,
                y: e.touches[0].clientY - rect.top
            };

            let dx = atualToque.x - inicioToque.x;
            let dy = atualToque.y - inicioToque.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist > 12) { // Margem de sensibilidade
                toqueDirecao.x = dx / dist;
                toqueDirecao.y = dy / dist;
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => {
            toqueDirecao = { x: 0, y: 0 }; // Para de andar ao retirar o dedo da tela
            inicioToque = null;
        });

        // Loop de Atualização Mecânica (Engine 60fps)
        function atualizar() {
            if (jogoPausado) return;

            let dx = 0;
            let dy = 0;

            // Leitura das teclas pressionadas
            if (teclasPressionadas['ArrowUp'] || teclasPressionadas['w']) dy = -casal.velocidade;
            if (teclasPressionadas['ArrowDown'] || teclasPressionadas['s']) dy = casal.velocidade;
            if (teclasPressionadas['ArrowLeft'] || teclasPressionadas['a']) dx = -casal.velocidade;
            if (teclasPressionadas['ArrowRight'] || teclasPressionadas['d']) dx = casal.velocidade;

            // Leitura do toque móvel
            if (toqueDirecao.x !== 0 || toqueDirecao.y !== 0) {
                dx = toqueDirecao.x * casal.velocidade;
                dy = toqueDirecao.y * casal.velocidade;
            }

            // Move deslizando pelas quinas horizontais
            if (dx !== 0) {
                let proxX = casal.x + dx;
                if (proxX - casal.raio > 0 && proxX + casal.raio < TAM_LOGICO && !colideComParede(proxX, casal.y, casal.raio)) {
                    casal.x = proxX;
                    if(Math.random() < 0.08) tocarTomMovimento();
                }
            }
            // Move deslizando pelas quinas verticais
            if (dy !== 0) {
                let proxY = casal.y + dy;
                if (proxY - casal.raio > 0 && proxY + casal.raio < TAM_LOGICO && !colideComParede(casal.x, proxY, casal.raio)) {
                    casal.y = proxY;
                    if(Math.random() < 0.08) tocarTomMovimento();
                }
            }

            // Mapeia em tempo real a casinha onde o casal está centralizado
            let casaC = Math.floor(casal.x / TAM_CASA);
            let casaL = Math.floor(casal.y / TAM_CASA);

            if(casaC >= 0 && casaC < 9 && casaL >= 0 && casaL < 9) {
                let item = mapa[casaL][casaC];
                if (item === 'M') {
                    pontos += 10;
                    document.getElementById('pontos-valor').innerText = pontos;
                    mapa[casaL][casaC] = '0';
                } else if (['C1', 'C2', 'C3', 'C4'].includes(item)) {
                    jogoPausado = true;
                    toqueDirecao = { x: 0, y: 0 };
                    casaSendoVisitada = { x: casaL, y: casaC, codigo: item };
                    pontos = pontos * 2;
                    document.getElementById('pontos-valor').innerText = pontos;
                    abrirModalCultural(item);
                }
            }

            // ==========================================================================
            // NOVA LÓGICA DO INIMIGO: PATRULHA FIXA + TELETRANSPORTE A CADA 3 SEGUNDOS
            // ==========================================================================
            // Verifica se passaram 3000ms (3 segundos) para sumir e reaparecer
            if (Date.now() - inimigo.tempoUltimoTeletransporte > 3000) {
                teletransportarInimigo();
                inimigo.tempoUltimoTeletransporte = Date.now();
            }

            // Avanço constante na direção atual definida
            let proxInimigoX = inimigo.x + (inimigo.dirX * inimigo.velocidade);
            let proxInimigoY = inimigo.y + (inimigo.dirY * inimigo.velocidade);

            // Verifica colisão com os limites físicos e paredes
            let bateuParedeX = colideComParede(proxInimigoX, inimigo.y, inimigo.raio) || (proxInimigoX - inimigo.raio <= 0) || (proxInimigoX + inimigo.raio >= TAM_LOGICO);
            let bateuParedeY = colideComParede(inimigo.x, proxInimigoY, inimigo.raio) || (proxInimigoY - inimigo.raio <= 0) || (proxInimigoY + inimigo.raio >= TAM_LOGICO);

            if (!bateuParedeX && inimigo.dirX !== 0) {
                inimigo.x = proxInimigoX;
            } else if (!bateuParedeY && inimigo.dirY !== 0) {
                inimigo.y = proxInimigoY;
            } else {
                // Se encontrar um bloqueio, rotaciona aleatoriamente para outra direção em linha reta
                let direcoes = [{x: 1, y: 0}, {x: -1, y: 0}, {x: 0, y: 1}, {x: 0, y: -1}];
                let dirSorteada = direcoes[Math.floor(Math.random() * direcoes.length)];
                inimigo.dirX = dirSorteada.x;
                inimigo.dirY = dirSorteada.y;
            }
            // ==========================================================================

            // Colisão Física entre Círculos (Casal vs Fantasma)
            let distInimigo = Math.sqrt(Math.pow(casal.x - inimigo.x, 2) + Math.pow(casal.y - inimigo.y, 2));
            if (distInimigo < (casal.raio + inimigo.raio)) {
                tocarSomColisao();
                let perda = Math.round(pontos * 0.3);
                pontos = Math.max(0, pontos - perda);
                document.getElementById('pontos-valor').innerText = pontos;
                
                alert(`Opa, esbarrou no obstáculo! O casal perdeu o ritmo. Pena de -30% dos pontos (-${perda} pts). Voltando para o início!`);
                
                casal.x = 4 * TAM_CASA + 25; casal.y = 4 * TAM_CASA + 25;
                teletransportarInimigo(); // Spawna o inimigo em local novo ao reiniciar
                inimigo.tempoUltimoTeletransporte = Date.now();
                toqueDirecao = { x: 0, y: 0 };
                teclasPressionadas = {};
            }
        }

        // Renderização dos Gráficos no Canvas
        let tempoPulsar = 0;
        function desenhar() {
            ctx.clearRect(0, 0, TAM_LOGICO, TAM_LOGICO);
            tempoPulsar += 0.05;

            for (let l = 0; l < QTD_CASAS; l++) {
                for (let c = 0; c < QTD_CASAS; c++) {
                    let tipo = mapa[l][c];
                    let x = c * TAM_CASA;
                    let y = l * TAM_CASA;

                    if (tipo === '1') {
                        ctx.fillStyle = '#d63031';
                        ctx.fillRect(x, y, TAM_CASA, TAM_CASA);
                        ctx.strokeStyle = '#ff7675';
                        ctx.strokeRect(x, y, TAM_CASA, TAM_CASA);
                    } else {
                        ctx.fillStyle = '#3d2306';
                        ctx.fillRect(x, y, TAM_CASA, TAM_CASA);

                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        if (tipo === 'M') {
                            ctx.font = '20px Arial';
                            ctx.fillText('🌽', x + 25, y + 25);
                        } else if (['C1', 'C2', 'C3', 'C4'].includes(tipo)) {
                            // Efeito pulsante visual nas atrações
                            let escalaPulse = 2 + Math.sin(tempoPulsar) * 2;
                            ctx.fillStyle = '#22a6b3';
                            ctx.fillRect(x + escalaPulse, y + escalaPulse, TAM_CASA - (escalaPulse*2), TAM_CASA - (escalaPulse*2));
                            ctx.font = '22px Arial';
                            ctx.fillText('🎪', x + 25, y + 25);
                        }
                    }
                }
            }

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Desenha o Jogador e o Obstáculo
            ctx.font = '26px Arial';
            ctx.fillText('👩‍❤️‍👨', casal.x, casal.y);
            
            // Efeito visual sutil: Se faltar menos de 300ms para sumir, pisca o fantasma
            let tempoRestante = 3000 - (Date.now() - inimigo.tempoUltimoTeletransporte);
            if (tempoRestante > 300 || Math.floor(Date.now() / 70) % 2 === 0) {
                ctx.fillText('👻', inimigo.x, inimigo.y);
            }
        }

        // Loop Principal do Game Engine
        function loop() {
            atualizar();
            desenhar();
            requestAnimationFrame(loop);
        }

        // Controle dos Modais Culturais
        function abrirModalCultural(cantoCodigo) {
            let dados = infoCantos[cantoCodigo];
            document.getElementById('modal-titulo').innerText = dados.titulo;
            document.getElementById('modal-texto').innerText = dados.texto;
            
            const botao = document.getElementById('modal-botao');
            botao.innerText = "Continuar Dançando! 🪗";
            botao.className = "";
            botao.setAttribute("onclick", "fecharModal()");
            
            document.getElementById('modal-info').style.display = 'flex';

            let player = document.getElementById('player-forro');
            player.src = dados.som;
            player.play().catch(()=>{});
        }

        function fecharModal() {
            document.getElementById('modal-info').style.display = 'none';
            document.getElementById('player-forro').pause();

            if (casaSendoVisitada) {
                mapa[casaSendoVisitada.x][casaSendoVisitada.y] = '0';
                casaSendoVisitada = null;
            }

            if (verificarFimDeJogo()) {
                exibirTelaVitoria();
            } else {
                jogoPausado = false;
                // Reseta o tempo de teletransporte para evitar que ele mude logo após despausar o jogo
                inimigo.tempoUltimoTeletransporte = Date.now();
            }
        }

        function verificarFimDeJogo() {
            for (let l = 0; l < 9; l++) {
                for (let c = 0; c < 9; c++) {
                    if (['C1', 'C2', 'C3', 'C4'].includes(mapa[l][c])) return false; 
                }
            }
            return true; 
        }

        // TELA DE VITÓRIA HISTÓRICA RESTAURADA INTEGRALMENTE
        function exibirTelaVitoria() {
            jogoPausado = true;
            
            document.getElementById('modal-titulo').innerText = "✨ ¡Viva! Você Zerou Aracaju! ✨";
            document.getElementById('modal-texto').innerHTML = `Muito obrigado por valorizar a nossa cultura junina!<br><br>Sua pontuação final foi de: <strong>${pontos} pontos</strong>.<br><br>Que tal expandir sua jornada pelo País do Forró? Prepare o tamanco, pois na próxima fase vamos conhecer os tradicionais festejos do interior do estado, começando pelo histórico <strong>Forró de Areia Branca</strong>!`;
            
            const botao = document.getElementById('modal-botao');
            botao.innerText = "Partir para Areia Branca! 🚌";
            botao.className = "btn-proxima-fase";
            botao.setAttribute("onclick", "proximaFase()");

            document.getElementById('modal-info').style.display = 'flex';

            let player = document.getElementById('player-forro');
            player.src = somVitoria;
            player.play().catch(()=>{});
        }

        function proximaFase() {
            document.getElementById('player-forro').pause();
            alert("Carregando o circuito turístico de Areia Branca... Prepare-se para novos desafios e mais forró!");
            location.reload(); 
        }

        // Inicia a execução contínua
        requestAnimationFrame(loop);
    </script>
</body>
